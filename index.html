<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b1220">
  <title>CorteFacil | Plataforma para barbearias</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230b1220'/%3E%3Crect x='6' y='6' width='52' height='52' rx='14' fill='none' stroke='%23d6a54b' stroke-width='2'/%3E%3Ctext x='50%25' y='54%25' text-anchor='middle' font-family='Arial,sans-serif' font-size='24' font-weight='700' fill='%23f7efe0'%3ECF%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-landing" data-app-entry="main">
  <div class="ambient ambient-left"></div>
  <div class="ambient ambient-right"></div>
  <div class="ambient ambient-bottom"></div>

  <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema">
    Dark
  </button>

  <div class="app-shell">
    <div class="app">
      <main class="content">
        <section id="login" class="tela">
          <div class="portal-landing-shell">
            <div class="portal-landing-hero">
              <div class="portal-entry-brand">
                <span class="brand-badge"><img src="assets/barbearia-logo.svg" alt="Logo Barbearia"></span>
                <div class="portal-entry-brand-copy">
                  <span class="portal-landing-badge">Plataforma de gestao e agendamento</span>
                  <strong class="brand-name">CorteFacil</strong>
                </div>
              </div>

              <div class="screen-header portal-landing-header">
                <span class="screen-kicker">Acesso rapido</span>
                <h1>Escolha o portal que deseja acessar</h1>
                <p>Entre direto no ambiente de cliente, operacao da barbearia ou administracao da plataforma.</p>
              </div>

              <div class="portal-entry-actions portal-entry-grid portal-entry-cta-row">
                <a class="portal-entry-button portal-access-card portal-access-card-client" href="/login/cliente/">
                  <span class="portal-access-icon" aria-hidden="true">CL</span>
                  <div class="portal-entry-button-copy">
                    <strong>Login Cliente</strong>
                  </div>
                </a>

                <a class="portal-entry-button portal-access-card portal-access-card-barber" href="/login/barbearia/">
                  <span class="portal-access-icon" aria-hidden="true">BR</span>
                  <div class="portal-entry-button-copy">
                    <strong>Login Barbearia</strong>
                  </div>
                </a>

                <a class="portal-entry-button portal-access-card portal-access-card-admin" href="/login/admin/">
                  <span class="portal-access-icon" aria-hidden="true">AD</span>
                  <div class="portal-entry-button-copy">
                    <strong>Login Admin</strong>
                  </div>
                </a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const THEME_STORAGE_KEY = 'barber-saas-theme';
      const toggleButton = document.getElementById('theme-toggle');

      function updateThemeToggleLabel(isDarkMode) {
        if (!toggleButton) {
          return;
        }
        toggleButton.textContent = isDarkMode ? 'Light' : 'Dark';
      }

      function applySavedTheme() {
        const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
        const isDarkMode = savedTheme === 'dark';

        document.body.classList.toggle('dark-mode', isDarkMode);
        updateThemeToggleLabel(isDarkMode);
      }

      toggleButton?.addEventListener('click', function () {
        const isDarkMode = document.body.classList.toggle('dark-mode');
        localStorage.setItem(THEME_STORAGE_KEY, isDarkMode ? 'dark' : 'light');
        updateThemeToggleLabel(isDarkMode);
      });

      applySavedTheme();
    }());
  </script>
</body>
</html>
